# NON Academy — Cloudflare Pages project.
# Frontend deploys from dist/ (see `npm run deploy`).
# The optional Worker in functions/ persists certification records.
# Bind KV before enabling persistence:
#   wrangler kv namespace create NON_ACADEMY_PROGRESS
# then uncomment the binding below and redeploy.
name = "non-academy"
# NON World account: 701d3513ccebc11ce8a329597b567059
# Pages config does not accept account_id here; pass it via the
# CLOUDFLARE_ACCOUNT_ID env var when deploying (see npm run deploy).
pages_build_output_dir = "dist"
compatibility_date = "2024-11-01"

# [[kv_namespaces]]
# binding = "PROGRESS"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
